name: Android APK Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
 

jobs:
  build-android-preview:
    runs-on: ubuntu-latest

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Debug Expo config
        run: |
          pwd
          ls -la
          cat app.json
          npx expo config --json
      - name: Verify Expo identity
        run: |
          npx eas-cli whoami
          npx eas-cli project:info

      - name: Trigger preview APK build
        run: npx eas-cli build -p android --profile preview --non-interactive --wait
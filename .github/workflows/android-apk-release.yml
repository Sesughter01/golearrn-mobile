name: Android APK Release

on:
  workflow_dispatch:
    inputs:
      build_profile:
        description: "EAS build profile to run"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      BUILD_PROFILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_profile || 'production' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android artifact with EAS
        run: |
          npx eas-cli build -p android --profile "$BUILD_PROFILE" --non-interactive --wait --json > eas-build.json
          cat eas-build.json

      - name: Download Android artifact
        run: |
          APK_URL=$(cat eas-build.json | jq -r '.[0].artifacts.buildUrl // .artifacts.buildUrl')
          echo "APK_URL=$APK_URL"
          if [ "$BUILD_PROFILE" = "production" ]; then
            curl -L "$APK_URL" -o "golearrn-mobile-${GITHUB_REF_NAME}.aab"
          else
            curl -L "$APK_URL" -o "golearrn-mobile-${GITHUB_REF_NAME}.apk"
          fi

      - name: Upload preview build artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: golearrn-mobile-${{ github.ref_name }}-${{ env.BUILD_PROFILE }}
          path: |
            golearrn-mobile-${{ github.ref_name }}.apk
            golearrn-mobile-${{ github.ref_name }}.aab
          if-no-files-found: ignore

      - name: Create GitHub Release and upload Android artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            golearrn-mobile-${{ github.ref_name }}.apk
            golearrn-mobile-${{ github.ref_name }}.aab
          name: GOLEARRN Mobile ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            GOLEARRN Mobile Android release.

            Version: ${{ github.ref_name }}

            Install the APK on an Android device for review/testing.
